<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cíclope Outfitters | Streetwear</title>
    <style>
        body { font-family: 'Helvetica', Arial, sans-serif; background-color: #000; color: #fff; margin: 0; padding: 0; }
        header { padding: 20px; border-bottom: 1px solid #333; text-align: center; }
        .logo img { width: 120px; height: auto; }
        nav ul { list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; font-size: 14px; }
        h2 { margin-top: 40px; border-left: 4px solid #fff; padding-left: 10px; margin-left: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .producto { background: #111; padding: 15px; border-radius: 8px; text-align: center; }
        .producto img { width: 100%; border-radius: 5px; background: #222; }
        .precio { color: #888; margin: 10px 0; }
        .btn-wsp { background: #25d366; color: #fff; text-decoration: none; padding: 10px; border-radius: 5px; display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="F3744D24-B4A6-495E-B6C5-611E90566F09.png" alt="CÍCLOPE">
    </div>
    <nav>
        <ul>
            <li><a href="#remeras">REMERAS</a></li>
            <li><a href="#buzos">BUZOS</a></li>
            <li><a href="#pantalones">PANTALONES</a></li>
            <li><a href="#bermudas">BERMUDAS</a></li>
        </ul>
    </nav>
</header>

<section id="remeras">
    <h2>Remeras</h2>
    <div class="grid">
        <div class="producto">
            <img src="remera1.jpg" alt="Remera">
            <p>Remera Boxy Fit</p>
            <p class="precio">$25.000</p>
            <a href="https://wa.me/TUNUMERO" class="btn-wsp">CONSULTAR</a>
        </div>
    </div>
</section>

</body>
</html>
