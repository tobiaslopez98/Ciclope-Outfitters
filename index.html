<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cíclope Outfitters | Streetwear Brand</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background-color: #fff; color: #000; overflow-x: hidden; }
        
        /* Barra de anuncio negra */
        .announcement-bar { background-color: #000; color: #fff; text-align: center; padding: 10px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Header con logo y menú */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: #000; }
        .logo img { height: 50px; }
        .cart-icon { font-size: 20px; position: relative; }

        /* Menú lateral (Sidebar) */
        .sidebar { position: fixed; left: -100%; width: 85%; height: 100%; background: #fff; transition: 0.4s; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 20px; }
        .sidebar.active { left: 0; }
        .close-btn { font-size: 30px; text-align: right; cursor: pointer; display: block; margin-bottom: 20px; }
        .sidebar-links a { display: block; padding: 15px 0; font-size: 18px; font-weight: 900; text-decoration: none; color: #000; border-bottom: 1px solid #f5f5f5; text-transform: uppercase; }
        
        /* Fondo oscuro al abrir menú */
        .overlay { position: fixed; display: none; width: 100%; height: 100%; top: 0; left: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }

        /* Imagen de Inicio con tu foto nueva */
        .hero-banner { 
            width: 100%; 
            height: 85vh; 
            background-image: url('34511f03-6770-4416-9a23-141de408e5df.jpeg'); 
            background-size: cover; 
            background-position: center; 
        }
        
        /* WhatsApp flotante */
        .wsp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); text-decoration: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="announcement-bar">A partir de $180.000 el envío es gratis!</div>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="logo">
            <img src="F3744D24-B4A6-495E-B6C5-611E90566F09.png" alt="CÍCLOPE">
        </div>
        <div class="cart-icon">👜 <small style="position:absolute; top:-5px; right:-10px; background:black; color:white; border-radius:50%; padding:2px 5px; font-size:10px;">0</small></div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <span class="close-btn" onclick="toggleMenu()">×</span>
        <div class="sidebar-links">
            <a href="#">Inicio</a>
            <a href="#">Buzos</a>
            <a href="#">Pantalones</a>
            <a href="#">Camperas</a>
            <a href="#">Vestidos</a>
            <a href="#">Tops</a>
            <a href="#">Camisas</a>
            <a href="#" style="font-size: 14px; margin-top: 20px; color: #666;">Contacto</a>
        </div>
    </div>

    <div class="hero-banner"></div>

    <a href="https://wa.me/TUNUMERO" class="wsp-float" target="_blank">💬</a>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }
    </script>

</body>
</html>
