<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cíclope Outfitters | Streetwear Brand</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background-color: #fff; color: #000; overflow-x: hidden; scroll-behavior: smooth; }
        .announcement-bar { background-color: #000; color: #fff; text-align: center; padding: 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: #000; }
        .logo img { height: 45px; }
        .sidebar { position: fixed; left: -100%; width: 85%; height: 100%; background: #fff; transition: 0.4s; z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 20px; }
        .sidebar.active { left: 0; }
        .sidebar-links a { display: block; padding: 15px 0; font-size: 18px; font-weight: 900; text-decoration: none; color: #000; border-bottom: 1px solid #f5f5f5; text-transform: uppercase; }
        .overlay { position: fixed; display: none; width: 100%; height: 100%; top: 0; left: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
        .hero-banner { width: 100%; height: 75vh; background-image: url('IMG_4586.jpeg'); background-size: cover; background-position: center 20%; }
        .container { padding: 40px 20px; }
        .category-title { font-size: 24px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; border-left: 4px solid #000; padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 50px; }
        .producto { text-align: center; }
        .producto img { width: 100%; border-radius: 5px; background: #f9f9f9; }
        .producto p { margin: 5px 0; font-weight: bold; font-size: 14px; }
        .precio { color: #666; font-size: 13px; }
        .wsp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 100; text-decoration: none; }
    </style>
</head>
<body>

    <div class="announcement-bar">A partir de $180.000 el envío es gratis!</div>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div class="logo"><img src="F3744D24-B4A6-495E-B6C5-611E90566F09.png" alt="CÍCLOPE"></div>
        <div>👜</div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <span onclick="toggleMenu()" style="font-size:30px; cursor:pointer;">×</span>
        <div class="sidebar-links">
            <a href="#" onclick="toggleMenu()">Inicio</a>
            <a href="#remeras" onclick="toggleMenu()">Remeras</a>
            <a href="#buzos" onclick="toggleMenu()">Buzos</a>
            <a href="#pantalones" onclick="toggleMenu()">Pantalones</a>
            <a href="#bermudas" onclick="toggleMenu()">Bermudas</a>
        </div>
    </div>

    <div class="hero-banner"></div>

    <div class="container">
        <div id="buzos" class="category-title">Buzos</div>
        <div class="grid">
            <div class="producto">
                <img src="IMG_1870.webp" alt="Buzo Cíclope">
                <p>Buzo Hoodie Flame</p>
                <div class="precio">$45.000</div>
            </div>
            <div class="producto">
                <img src="IMG_1875.webp" alt="Buzo Cíclope">
                <p>Buzo Acid Wash</p>
                <div class="precio">$48.000</div>
            </div>
        </div>

        <div id="remeras" class="category-title">Remeras</div>
        <div class="grid">
            <p style="grid-column: span 2; color: #999;">Próximamente...</p>
        </div>
    </div>

    <a href="https://wa.me/TUNUMERO" class="wsp-float" target="_blank">💬</a>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }
    </script>
</body>
</html>
